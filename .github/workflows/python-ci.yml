name: Python CI & Code Review
# Triggers on every push or PR to main/master
on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Get your repo code into the runner
      - uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"  # Speeds up future runs by caching packages

      # 3. Install tools (add your project deps here later: pip install -r requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Check code style & catch bugs (Ruff replaces flake8, isort, pycodestyle)
      - name: Lint with Ruff
        run: ruff check .

      # 5. Check if code is properly formatted
      - name: Check formatting
        run: ruff format --check .